<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL DA3LOB 🔥</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
background:#050816;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* Canvas خلفية */
canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

/* المحتوى */
.container{
position:relative;
z-index:1;
animation: fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

h1{
font-size:60px;
color:#38bdf8;
text-shadow:0 0 20px #38bdf8;
animation: float 3s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

p{
opacity:0.8;
margin-top:10px;
font-size:18px;
}

.card{
margin-top:25px;
padding:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(56,189,248,0.3);
border-radius:15px;
box-shadow:0 0 30px rgba(56,189,248,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 40px rgba(56,189,248,0.4);
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0ea5e9;
transform:scale(1.1);
}

.contact{
margin-top:15px;
line-height:2;
text-align:right;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
<h1>EL DA3LOB 🔥</h1>
<p>أفشخ موقع هتشوفه 😎</p>

<div class="card">
<h2>🚀 عني</h2>
<p>مطور مواقع بيحول الأفكار لواقع 🔥</p>

<button onclick="boom()">اضغط هنا</button>

<div class="contact">
<p>📞 +201556534517</p>
<p>📧 Mostafabbaaan@gmail.com</p>
<p>📸 el._.kuwaiti</p>
</div>
</div>

</div>

<script>
function boom(){
alert("🔥 إنت دخلت وضع الفشيخ 🔥");
}

/* Particles */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3,
dx:(Math.random()-0.5)*1,
dy:(Math.random()-0.5)*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#38bdf8";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.x += p.dx;
p.y += p.dy;

if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
});
}

function animate(){
draw();
requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
