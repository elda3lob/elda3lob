<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>موقعي</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            direction: rtl;
            background-color: #f5f5f5;
        }

        /* Navbar */
        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            color: yellow;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 50px;
            background-color: #007bff;
            color: white;
        }

        /* Sections */
        .section {
            padding: 40px;
            text-align: center;
        }

        /* Button */
        button {
            padding: 10px 20px;
            background-color: #007bff;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            nav a {
                display: block;
                margin: 5px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">عن الموقع</a>
        <a href="#">تواصل</a>
    </nav>

    <!-- Hero -->
    <div class="hero">
        <h1>أهلاً بيك في موقعي</h1>
        <p>ده أول موقع ليا 😎</p>
        <button>تواصل معايا</button>
    </div>

    <!-- About -->
    <div class="section">
        <h2>عن الموقع</h2>
        <p>الموقع ده معمول لتجربة تصميم مواقع الويب باستخدام HTML و CSS</p>
    </div>

    <!-- Contact -->
    <div class="section">
        <h2>تواصل معايا</h2>
        <p>Email: Mostafabbaaan@gmail.com</p>
        <p>Phone: 01556534517</p>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 - كل الحقوق محفوظة</p>
    </footer>

</body>
</html>
